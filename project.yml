name: Pulse
options:
  bundleIdPrefix: app.pulse
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
fileGroups:
  - Pulse/Resources/Localizable.xcstrings
knownRegions:
  - en
  - tr
  - es
  - pt-BR
  - fr
  - de
  - it
  - ru
  - ja
  - ko
  - zh-Hans
  - ar
  - hi
  - Base
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Pulse:
    type: application
    platform: iOS
    sources:
      - path: Pulse
      - path: Pulse/Resources/Localizable.xcstrings
      - path: Pulse.storekit
      - path: Pulse/Resources/AppIcon-Midnight@2x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Midnight@3x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Health@2x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Health@3x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Sunset@2x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Sunset@3x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Mono@2x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Mono@3x.png
        buildPhase: resources
    dependencies:
      - target: PulseWidget
    scheme:
      storeKitConfiguration: Pulse.storekit
    info:
      path: Pulse/Resources/Info.plist
      properties:
        CFBundleDisplayName: Pulse
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "Pulse needs read access to estimate photo, video, and screenshot usage. Nothing is uploaded."
        NSPhotoLibraryAddUsageDescription: "Pulse can save shareable score cards to your library."
        CFBundleIcons:
          CFBundleAlternateIcons:
            Midnight:
              CFBundleIconFiles: ["AppIcon-Midnight"]
              UIPrerenderedIcon: false
            Health:
              CFBundleIconFiles: ["AppIcon-Health"]
              UIPrerenderedIcon: false
            Sunset:
              CFBundleIconFiles: ["AppIcon-Sunset"]
              UIPrerenderedIcon: false
            Mono:
              CFBundleIconFiles: ["AppIcon-Mono"]
              UIPrerenderedIcon: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.birkan.pulse
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Pulse/Resources/Pulse.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES

  PulseWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PulseWidget
      - path: Pulse/Core/Persistence/SharedScoreStore.swift
      - path: Pulse/Features/Scan/Probes/BatteryProbe.swift
      - path: Pulse/Features/Scan/Probes/StorageProbe.swift
      - path: Pulse/Features/Scan/Probes/ThermalProbe.swift
      - path: Pulse/Features/Scan/ScanIntent.swift
    info:
      path: PulseWidget/Info.plist
      properties:
        CFBundleDisplayName: Pulse
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.birkan.pulse.widget
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: PulseWidget/PulseWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES
