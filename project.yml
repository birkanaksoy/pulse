name: Pulse
options:
  bundleIdPrefix: com.birkan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
fileGroups:
  - Pulse/Resources/Localizable.xcstrings
knownRegions:
  - en
  - tr
  - es
  - pt-BR
  - fr
  - de
  - it
  - ru
  - ja
  - ko
  - zh-Hans
  - ar
  - hi
  - Base
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Pulse:
    type: application
    platform: iOS
    sources:
      - path: Pulse
      - path: Pulse/Resources/Localizable.xcstrings
      - path: Pulse.storekit
      - path: Pulse/Resources/AppIcon-TwoTone@2x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-TwoTone@3x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Gauge@2x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Gauge@3x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Sonar@2x.png
        buildPhase: resources
      - path: Pulse/Resources/AppIcon-Sonar@3x.png
        buildPhase: resources
    info:
      path: Pulse/Resources/Info.plist
      properties:
        CFBundleDisplayName: Pulse
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "Pulse reads your photo library to suggest items to delete. Nothing is uploaded."
        NSPhotoLibraryAddUsageDescription: "Pulse can save shareable cards to your library."
        CFBundleIcons:
          CFBundleAlternateIcons:
            TwoTone:
              CFBundleIconFiles: ["AppIcon-TwoTone"]
              UIPrerenderedIcon: false
            Gauge:
              CFBundleIconFiles: ["AppIcon-Gauge"]
              UIPrerenderedIcon: false
            Sonar:
              CFBundleIconFiles: ["AppIcon-Sonar"]
              UIPrerenderedIcon: false
        CFBundleLocalizations:
          - en
          - tr
          - es
          - pt-BR
          - fr
          - de
          - it
          - ru
          - ja
          - ko
          - zh-Hans
          - ar
          - hi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.birkan.pulse
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Pulse/Resources/Pulse.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    scheme:
      storeKitConfiguration: Pulse.storekit
